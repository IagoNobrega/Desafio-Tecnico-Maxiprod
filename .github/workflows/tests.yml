name: 🧪 Maxiprod Test Suite - CI/CD

permissions:
  contents: read
  checks: write

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Executar testes diariamente às 2 AM UTC
    - cron: '0 2 * * *'

env:
  DOTNET_VERSION: '9.0.x'
  NODE_VERSION: '18.x'

jobs:
  # ====================================================================
  # JOB 1: Backend Unit Tests (.NET / xUnit)
  # ====================================================================
  backend-unit-tests:
    name: 🔷 Backend - Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Restore dependencies
        working-directory: tests/backend
        run: dotnet restore

      - name: 🔨 Build
        working-directory: tests/backend
        run: dotnet build --no-restore --configuration Release

      - name: 🧪 Run Unit Tests
        working-directory: tests/backend
        run: dotnet test MaxiprodTests.csproj --configuration Release --filter Category=Unit --verbosity normal --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: 📊 Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-tests-results
          path: tests/backend/TestResults/

      - name: 📊 Publish Test Results
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: tests/backend/TestResults/**/*.trx
          check_name: Backend Unit Tests

  # ====================================================================
  # JOB 2: Backend Integration Tests (.NET / xUnit / API)
  # ====================================================================
  backend-integration-tests:
    name: 🔷 Backend - Integration Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Restore dependencies
        working-directory: tests/backend
        run: dotnet restore

      - name: 🔨 Build
        working-directory: tests/backend
        run: dotnet build --no-restore --configuration Release

      - name: ⏳ Wait for backend API (optional - comment out if not needed)
        run: |
          echo "⏳ Aguardando API backend em localhost:5135..."
          timeout 30 bash -c 'until curl http://localhost:5135/health; do sleep 1; done' || true

      - name: 🧪 Run Integration Tests
        working-directory: tests/backend
        run: dotnet test MaxiprodTests.csproj --configuration Release --filter Category=Integration --verbosity normal --logger "trx;LogFileName=test-results-integration.trx" || true
        continue-on-error: true

      - name: 📊 Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-tests-results
          path: tests/backend/TestResults/

  # ====================================================================
  # JOB 3: Frontend Unit Tests (Vitest)
  # ====================================================================
  frontend-unit-tests:
    name: ⚛️ Frontend - Unit Tests (Vitest)
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: tests/frontend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: tests/frontend
        run: npm ci

      - name: 🧪 Run Unit Tests
        working-directory: tests/frontend
        run: npm run test:run -- --reporter=json --reporter=verbose > test-results.json || true
        continue-on-error: true

      - name: 📊 Coverage
        working-directory: tests/frontend
        run: npm run test:coverage || true
        continue-on-error: true

      - name: 📊 Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-unit-tests-results
          path: |
            tests/frontend/test-results.json
            tests/frontend/coverage/

  # ====================================================================
  # JOB 4: Frontend E2E Tests (Playwright)
  # ====================================================================
  frontend-e2e-tests:
    name: 🎭 Frontend - E2E Tests (Playwright)
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: tests/frontend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: tests/frontend
        run: npm ci

      - name: 🎭 Install Playwright browsers
        working-directory: tests/frontend
        run: npx playwright install --with-deps

      - name: ⏳ Wait for frontend (optional - comment out if not needed)
        run: |
          echo "⏳ Aguardando frontend em localhost:5173..."
          timeout 30 bash -c 'until curl http://localhost:5173; do sleep 1; done' || true

      - name: 🧪 Run E2E Tests
        working-directory: tests/frontend
        run: npm run e2e || true
        continue-on-error: true

      - name: 📊 Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/frontend/playwright-report/
          retention-days: 30

  # ====================================================================
  # JOB 5: Code Quality & Coverage
  # ====================================================================
  code-quality:
    name: 📈 Code Quality Analysis
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Restore backend dependencies
        working-directory: tests/backend
        run: dotnet restore

      - name: 🔍 Code Analysis (.NET)
        working-directory: tests/backend
        run: dotnet build --configuration Release /p:EnforceCodeStyleInBuild=true || true
        continue-on-error: true

      - name: 📊 Generate Coverage Badge
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: tests/backend/TestResults/coverage.cobertura.xml
          if-no-files-found: ignore

  # ====================================================================
  # JOB 6: Report & Summary
  # ====================================================================
  test-summary:
    name: 📋 Test Summary
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, backend-integration-tests, frontend-unit-tests, frontend-e2e-tests]
    if: always()
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📊 Create Test Summary
        run: |
          echo "# 🧪 Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Status" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Backend Unit Tests: ${{ needs.backend-unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Backend Integration Tests: ${{ needs.backend-integration-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ⚛️  Frontend Unit Tests: ${{ needs.frontend-unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🎭 Frontend E2E Tests: ${{ needs.frontend-e2e-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 Backend Unit Results: [Download](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 Frontend Tests Results: [Download](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "- 🎬 Playwright Report: [View](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

      - name: 💬 Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🧪 Test Results
              
              - **Backend Unit Tests**: ${{ needs.backend-unit-tests.result }}
              - **Backend Integration Tests**: ${{ needs.backend-integration-tests.result }}
              - **Frontend Unit Tests**: ${{ needs.frontend-unit-tests.result }}
              - **Frontend E2E Tests**: ${{ needs.frontend-e2e-tests.result }}
              
              [View Full Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            })

  # ====================================================================
  # JOB 7: Notification
  # ====================================================================
  notify:
    name: 📢 Notify Results
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, backend-integration-tests, frontend-unit-tests, frontend-e2e-tests, test-summary]
    if: always() && github.ref == 'refs/heads/main'
    
    steps:
      - name: ✅ Success
        if: |
          needs.backend-unit-tests.result == 'success' &&
          needs.frontend-unit-tests.result == 'success'
        run: echo "✅ All tests passed!"

      - name: ⚠️ Warning
        if: |
          (needs.backend-integration-tests.result == 'failure' ||
           needs.frontend-e2e-tests.result == 'failure') &&
          needs.backend-unit-tests.result == 'success' &&
          needs.frontend-unit-tests.result == 'success'
        run: echo "⚠️ Unit tests passed but integration/E2E failed"

      - name: ❌ Failure
        if: |
          needs.backend-unit-tests.result == 'failure' ||
          needs.frontend-unit-tests.result == 'failure'
        run: |
          echo "❌ Critical tests failed - blocking PR"
          exit 1
